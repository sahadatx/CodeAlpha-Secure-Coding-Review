{% extends "base.html" %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header">
        <h3>User Profile</h3>
    </div>

    <div class="card-body">

        <table class="table table-bordered">

            <tr>
                <th>User ID</th>
                <td>{{ user.id }}</td>
            </tr>

            <tr>
                <th>Username</th>
                <td>{{ user.username }}</td>
            </tr>

            <tr>
                <th>Password</th>
                <td>{{ user.password }}</td>
            </tr>

        </table>

        <a href="/dashboard" class="btn btn-secondary">
            Back
        </a>

    </div>

</div>

{% endblock %}
