{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6 col-lg-5">

        <div class="card shadow-lg border-0 mt-5">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2>📝 Create Account</h2>

                    <p class="text-muted">
                        Register to access the Secure Coding Review application.
                    </p>

                </div>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            class="form-control"
                            type="text"
                            name="username"
                            placeholder="Enter your username"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            class="form-control"
                            type="password"
                            name="password"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            class="btn btn-primary btn-lg"
                            type="submit">

                            Register

                        </button>

                    </div>

                </form>

                <hr>

                <p class="text-center mb-0">

                    Already have an account?

                    <a href="{{ url_for('auth.login') }}">
                        Login
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
