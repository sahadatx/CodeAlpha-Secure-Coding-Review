{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h2>User Login</h2>

<form method="POST">

    <label>Username</label><br>
    <input type="text" name="username">

    <br><br>

    <label>Password</label><br>
    <input type="password" name="password">

    <br><br>

    <button type="submit">Login</button>

</form>

<br>

<a href="/register">Create New Account</a>

{% endblock %}
