{% extends "base.html" %}

{% block title %}
Search
{% endblock %}

{% block content %}

<div class="card shadow">

<div class="card-header">

<h3>User Search</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Search Username</label>

<input
class="form-control"
type="text"
name="search">

</div>

<button
class="btn btn-primary">

Search

</button>

</form>

<br>

{% if results %}

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>

<th>Username</th>

<th>Password</th>

</tr>

</thead>

<tbody>

{% for user in results %}

<tr>

<td>{{ user.id }}</td>

<td>{{ user.username }}</td>

<td>{{ user.password }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endif %}

</div>

</div>

{% endblock %}
